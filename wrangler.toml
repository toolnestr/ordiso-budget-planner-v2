# Cloudflare Workers configuration for the OpenNext adapter.
# Deploy with: npx wrangler deploy   (after `npx @opennextjs/cloudflare build`)
name = "ordiso"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# OpenNext outputs the Worker entry + static assets here
main = ".open-next/worker.js"
assets = { directory = ".open-next/assets", binding = "ASSETS" }

# Observability (free, helps debug runtime errors)
[observability]
enabled = true

# Environment variables — set sensitive values in the Cloudflare dashboard,
# not in this file.
[vars]
NEXTAUTH_URL = "https://ordiso.<your-subdomain>.workers.dev"
